<section class="updates section-pad">
  <div class="container">
    <div class="section-header" slideIn>
      <div class="section-header__title-row">
        <div class="section-header__icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" width="26" height="26">
            <path d="M4 22h16a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2H8a2 2 0 0 0-2 2v16a2 2 0 0 1-2 2Zm0 0a2 2 0 0 1-2-2v-9c0-1.1.9-2 2-2h2"/>
            <path d="M18 14h-8"/><path d="M15 18h-5"/><path d="M10 6h8v4h-8z"/>
          </svg>
        </div>
        <h2>Latest Updates</h2>
      </div>
      <p class="section-desc">Stay updated with the latest developments in renewable energy, industry insights, and Neonergy project milestones.</p>
    </div>
    <div class="updates__grid">
      @for (item of updates; track item.title; let i = $index) {
        <article class="update-card" [style.background]="item.bg" [style.border-color]="item.accent" slideIn [slideInDelay]="i * 0.12">
          <h3 class="update-card__title" [style.background]="item.accent">{{ item.title }}</h3>
          <div class="update-card__visual" aria-hidden="true">{{ item.emoji }}</div>
          <div class="update-card__body">
            <span class="update-card__tag" [style.background]="item.accent">{{ item.tag }}</span>
            <p>{{ item.desc }}</p>
            <a [routerLink]="item.route" [fragment]="item.fragment" class="update-card__link">Know More →</a>
          </div>
        </article>
      }
    </div>
    <div class="section-cta">
      <a routerLink="/media" class="btn-outline-primary">View All Updates →</a>
    </div>
  </div>
</section>

<section class="team-preview section-pad">
  <div class="container">
    <div class="section-header">
      <p class="section-eyebrow">The people behind it</p>
      <h2>Core Team</h2>
    </div>
    <div class="team-preview__grid">
      @for (member of members; track member.name) {
        <div class="team-card">
          <div class="team-card__avatar" aria-hidden="true">
            <span>{{ member.name.charAt(0) }}</span>
          </div>
          <h3 class="team-card__name">{{ member.name }}</h3>
          <p class="team-card__role">{{ member.role }}</p>
          <p class="team-card__bio">{{ member.bio }}</p>
          <a [href]="member.linkedIn" target="_blank" rel="noopener" class="team-card__linkedin" [attr.aria-label]="'LinkedIn profile of ' + member.name">
            <mat-icon>link</mat-icon> LinkedIn
          </a>
        </div>
      }
    </div>
    <div class="team-preview__footer">
      <a mat-stroked-button color="primary" routerLink="/about/team">Meet the full team <mat-icon>arrow_forward</mat-icon></a>
    </div>
  </div>
</section>

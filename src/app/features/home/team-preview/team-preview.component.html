<section class="team-preview section-pad">
  <div class="container">
    <div class="section-header" slideIn>
      <div class="section-header__title-row">
        <div class="section-header__icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" width="26" height="26">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
            <circle cx="9" cy="7" r="4"/>
            <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
            <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
          </svg>
        </div>
        <h2>Core Team</h2>
      </div>
    </div>
    <div class="team-preview__grid">
      @for (member of members; track member.name; let i = $index) {
        <div class="team-card" [style.border-color]="member.color" slideIn [slideInDelay]="i * 0.1">
          <div class="team-card__photo-wrap" [style.border-color]="member.color">
            <img [src]="member.photo" [alt]="member.name" class="team-card__photo"
                 onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';" />
            <div class="team-card__avatar-fallback" style="display:none">
              <span>{{ member.name.charAt(0) }}</span>
            </div>
          </div>
          <h3 class="team-card__name">{{ member.name }}</h3>
          <p class="team-card__role">{{ member.title }}</p>
          <p class="team-card__bio">{{ member.bio }}</p>
          <a [href]="member.linkedin" target="_blank" rel="noopener" class="team-card__linkedin" [attr.aria-label]="'LinkedIn profile of ' + member.name">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.064 2.064 0 1 1 2.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
            LinkedIn
          </a>
        </div>
      }
    </div>
    <div class="team-preview__footer">
      <a routerLink="/about" fragment="team" class="btn-team">Meet the Full Team →</a>
    </div>
  </div>
</section>

<section class="projects-band" #bandRef>
  <div class="container projects-band__inner">
    <div class="projects-band__stats">
      <div class="pb-heading" slideIn>
        <div class="pb-heading__icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" width="26" height="26">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
            <polyline points="9 22 9 12 15 12 15 22"/>
          </svg>
        </div>
        <h2>Projects that define us</h2>
      </div>

      <div class="pb-cards">
        <!-- Projects Under Development -->
        <div class="pb-card pb-card--green" slideIn>
          <div class="pb-card__header">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
              <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
              <polyline points="9 22 9 12 15 12 15 22"/>
            </svg>
            <span>Projects Under Development</span>
          </div>
          <div class="pb-card__body">
            <div class="pb-card__formula">
              <div class="pb-pill">
                <span class="pb-pill__label">Utility</span>
                <span class="pb-pill__val">516 MWp</span>
              </div>
              <span class="pb-card__plus">+</span>
              <div class="pb-pill">
                <span class="pb-pill__label">C&amp;I</span>
                <span class="pb-pill__val">529 MWp</span>
              </div>
              <span class="pb-card__eq">=</span>
              <span class="pb-card__total">1045 MWp</span>
            </div>
          </div>
        </div>

        <!-- Commissioned -->
        <div class="pb-card pb-card--blue" slideIn [slideInDelay]="0.15">
          <div class="pb-card__header">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="18" height="18">
              <polyline points="20 6 9 17 4 12"/>
            </svg>
            <span>Commissioned</span>
          </div>
          <div class="pb-card__body">
            <span class="pb-card__total pb-card__total--blue">62 MWp</span>
          </div>
        </div>
      </div>
    </div>

    <div class="projects-band__map">
      <div class="projects-band__map-frame">
        <app-footprint-map [autoplay]="true" [loop]="false" />
      </div>
      <div class="projects-band__map-cta">
        <a routerLink="/projects" class="btn-explore">Explore All Projects →</a>
      </div>
    </div>
  </div>
</section>

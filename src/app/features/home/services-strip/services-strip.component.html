<section class="services section-pad">
  <div class="container">
    <div class="section-header" slideIn>
      <div class="section-header__title-row">
        <div class="section-header__icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" width="26" height="26">
            <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>
          </svg>
        </div>
        <h2>Service Offerings</h2>
      </div>
    </div>
    @for (group of groups; track group.label) {
      <div class="services__group">
        <div class="services__group-label" slideIn [slideInDelay]="0.1">
          <span>{{ group.label }}</span>
        </div>
        <div class="services__grid" [style.grid-template-columns]="'repeat(' + group.cols + ', 1fr)'">
          @for (svc of group.services; track svc.slug; let i = $index) {
            <a routerLink="/services" [fragment]="svc.slug" class="service-cell"
               [style.border-color]="svc.color" slideIn [slideInDelay]="0.2 + i * 0.08">
              <div class="service-cell__header">
                <mat-icon class="service-cell__icon" aria-hidden="true"
                          [style.color]="svc.color">{{ svc.icon }}</mat-icon>
                <h3 class="service-cell__title">{{ svc.title }}</h3>
              </div>
              <p class="service-cell__tagline">{{ svc.tagline }}</p>
              <span class="service-cell__know-more" [style.background]="svc.color">Know More →</span>
            </a>
          }
        </div>
      </div>
    }
    <div class="section-cta">
      <a routerLink="/services" class="btn-outline-primary">View All Service Offerings →</a>
    </div>
  </div>
</section>

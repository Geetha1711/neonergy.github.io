<section class="hero" [class.hero--static]="videoEnded">
  <!-- Background video -->
  @if (!reducedMotion) {
    <video #heroVideo class="hero__video" autoplay muted playsinline preload="auto" poster="assets/images/hero-poster.jpg">
      <source src="assets/videos/hero.mp4" type="video/mp4">
    </video>
  }
  <div class="hero__scrim"></div>

  <!-- Video controls — always visible when not reduced motion -->
  @if (!reducedMotion) {
    <div class="hero__video-controls">
      <!-- Replay when ended, play/pause otherwise -->
      <button class="hero__ctrl-btn" (click)="videoEnded ? replayVideo() : togglePlay()"
              [attr.aria-label]="videoEnded ? 'Replay video' : (isPlaying ? 'Pause video' : 'Play video')">
        @if (videoEnded) {
          <svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20" aria-hidden="true">
            <path d="M17.65 6.35A7.96 7.96 0 0 0 12 4C7.58 4 4 7.58 4 12s3.58 8 8 8 8-3.58 8-8h-2c0 3.31-2.69 6-6 6s-6-2.69-6-6 2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L11 11h7V4l-2.35 2.35z"/>
          </svg>
        } @else if (isPlaying) {
          <svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20" aria-hidden="true">
            <rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/>
          </svg>
        } @else {
          <svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20" aria-hidden="true">
            <path d="M8 5v14l11-7z"/>
          </svg>
        }
      </button>
      <button class="hero__ctrl-btn" (click)="toggleMute()" [attr.aria-label]="isMuted ? 'Unmute video' : 'Mute video'">
        @if (isMuted) {
          <svg viewBox="0 0 24 24" fill="none" width="20" height="20" aria-hidden="true">
            <path d="M11 5L6 9H2v6h4l5 4V5z" fill="currentColor"/>
            <line x1="23" y1="9" x2="17" y2="15" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <line x1="17" y1="9" x2="23" y2="15" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        } @else {
          <svg viewBox="0 0 24 24" fill="none" width="20" height="20" aria-hidden="true">
            <path d="M11 5L6 9H2v6h4l5 4V5z" fill="currentColor"/>
            <path d="M15.54 8.46a5 5 0 0 1 0 7.07" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <path d="M19.07 4.93a10 10 0 0 1 0 14.14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        }
      </button>
    </div>
  }

<button class="hero__scroll-hint" (click)="scrollToNext()" aria-label="Scroll to next section">
    <span class="hero__scroll-label">SCROLL</span>
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="20" height="20" aria-hidden="true">
      <polyline points="6 9 12 15 18 9"/>
    </svg>
  </button>
</section>
